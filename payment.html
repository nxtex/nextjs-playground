<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Information</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600&family=Source+Code+Pro:wght@300;400;600&family=Rock+Salt&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #f9f9f9;
            display: flex;
            align-content: center;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-wrap: wrap;
            font-family: 'Raleway', sans-serif;
        }

        .payment-title {
            width: 100%;
            text-align: center;
            padding: 20px 0 10px;
        }

        .payment-title h1 {
            font-size: 28px;
            color: #333;
            font-weight: 600;
        }

        .container {
            width: 100%;
            max-width: 400px;
            max-height: 251px;
            height: 54vw;
            padding: 20px;
            perspective: 1000px;
        }

        .preload * {
            -webkit-transition: none !important;
            -moz-transition: none !important;
            -ms-transition: none !important;
            -o-transition: none !important;
        }

        .creditcard {
            width: 100%;
            max-width: 400px;
            -webkit-transform-style: preserve-3d;
            transform-style: preserve-3d;
            transition: transform 0.6s, -webkit-transform 0.6s;
            cursor: pointer;
            position: relative;
        }

        .creditcard .front,
        .creditcard .back {
            position: absolute;
            width: 100%;
            max-width: 400px;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
            color: #47525d;
        }

        .creditcard .back {
            -webkit-transform: rotateY(180deg);
            transform: rotateY(180deg);
        }

        .creditcard.flipped {
            -webkit-transform: rotateY(180deg);
            transform: rotateY(180deg);
        }

        .creditcard svg#cardfront,
        .creditcard svg#cardback {
            width: 100%;
            box-shadow: 1px 5px 6px 0px black;
            border-radius: 22px;
        }

        #ccsingle {
            position: absolute;
            right: 15px;
            top: 20px;
        }

        #ccsingle svg {
            width: 100px;
            max-height: 60px;
        }

        .form-container {
            display: grid;
            grid-column-gap: 10px;
            grid-template-columns: auto auto;
            grid-template-rows: 90px 90px 90px;
            grid-template-areas:
                "name name"
                "number number"
                "expiration security";
            max-width: 400px;
            padding: 20px;
            color: #707070;
        }

        .form-container .field-container:first-of-type  { grid-area: name; }
        .form-container .field-container:nth-of-type(2) { grid-area: number; }
        .form-container .field-container:nth-of-type(3) { grid-area: expiration; }
        .form-container .field-container:nth-of-type(4) { grid-area: security; }

        .field-container { position: relative; }

        label {
            display: block;
            padding-bottom: 5px;
            font-size: 13px;
        }

        input {
            margin-top: 3px;
            padding: 15px;
            font-size: 16px;
            width: 100%;
            border-radius: 3px;
            border: 1px solid #dcdcdc;
            font-family: 'Raleway', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: #aaa;
            box-shadow: 0 0 0 3px rgba(0,0,0,0.07);
        }

        #generatecard {
            cursor: pointer;
            float: right;
            font-size: 12px;
            color: #fff;
            padding: 2px 4px;
            background-color: #909090;
            border-radius: 4px;
        }

        .ccicon {
            height: 38px;
            position: absolute;
            right: 6px;
            top: calc(50% - 17px);
            width: 60px;
        }

        .pay-button-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 0 20px 30px;
        }

        .pay-button {
            width: 100%;
            padding: 15px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            transition: background 0.3s;
        }

        .pay-button:hover { background: #555; }

        .creditcard .lightcolor,
        .creditcard .darkcolor { -webkit-transition: fill .5s; transition: fill .5s; }

        .creditcard .lightblue    { fill: #03A9F4; }
        .creditcard .lightbluedark{ fill: #0288D1; }
        .creditcard .red          { fill: #ef5350; }
        .creditcard .reddark      { fill: #d32f2f; }
        .creditcard .purple       { fill: #ab47bc; }
        .creditcard .purpledark   { fill: #7b1fa2; }
        .creditcard .cyan         { fill: #26c6da; }
        .creditcard .cyandark     { fill: #0097a7; }
        .creditcard .green        { fill: #66bb6a; }
        .creditcard .greendark    { fill: #388e3c; }
        .creditcard .lime         { fill: #d4e157; }
        .creditcard .limedark     { fill: #afb42b; }
        .creditcard .yellow       { fill: #ffeb3b; }
        .creditcard .yellowdark   { fill: #f9a825; }
        .creditcard .orange       { fill: #ff9800; }
        .creditcard .orangedark   { fill: #ef6c00; }
        .creditcard .grey         { fill: #bdbdbd; }
        .creditcard .greydark     { fill: #616161; }

        #svgname { text-transform: uppercase; }
        #cardfront .st2  { fill: #FFFFFF; }
        #cardfront .st3  { font-family: 'Source Code Pro', monospace; font-weight: 600; }
        #cardfront .st4  { font-size: 54.7817px; }
        #cardfront .st5  { font-family: 'Source Code Pro', monospace; font-weight: 400; }
        #cardfront .st6  { font-size: 33.1112px; }
        #cardfront .st7  { opacity: 0.6; fill: #FFFFFF; }
        #cardfront .st8  { font-size: 24px; }
        #cardfront .st9  { font-size: 36.5498px; }
        #cardfront .st10 { font-family: 'Source Code Pro', monospace; font-weight: 300; }
        #cardfront .st11 { font-size: 16.1716px; }
        #cardfront .st12 { fill: #4C4C4C; }

        #cardback .st0  { fill: none; stroke: #0F0F0F; stroke-miterlimit: 10; }
        #cardback .st2  { fill: #111111; }
        #cardback .st3  { fill: #F2F2F2; }
        #cardback .st4  { fill: #D8D2DB; }
        #cardback .st5  { fill: #C4C4C4; }
        #cardback .st6  { font-family: 'Source Code Pro', monospace; font-weight: 400; }
        #cardback .st7  { font-size: 27px; }
        #cardback .st8  { opacity: 0.6; }
        #cardback .st9  { fill: #FFFFFF; }
        #cardback .st10 { font-size: 24px; }
        #cardback .st11 { fill: #EAEAEA; }
        #cardback .st12 { font-family: 'Rock Salt', cursive; }
        #cardback .st13 { font-size: 37.769px; }
    </style>
</head>

            <svg id="ccicon" class="ccicon" width="750" height="471" viewBox="0 0 750 471" version="1.1"

        let visasingle = '<svg version="1.1" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="750px" height="471px" viewBox="0 0 750 471"><path fill="#0E4595" d="M278.198,334.228l33.36-195.763h53.358l-33.384,195.763H278.198z"/><path fill="#F2AE14" d="M131.92,138.464H45.879l-0.682,4.073c66.939,16.204,111.232,55.363,129.618,102.415l-18.709-89.96C152.877,142.596,143.509,138.896,131.92,138.464"/></svg>';

        let mastercardsingle = '<svg xmlns="http://www.w3.org/2000/svg" width="482.51" height="374" viewBox="0 0 482.51 374"><rect x="169.81" y="31.89" width="143.72" height="234.42" fill="#ff5f00"/><path d="M317.05,197.6A149.5,149.5,0,0,1,373.79,80.39a149.1,149.1,0,1,0,0,234.42A149.5,149.5,0,0,1,317.05,197.6Z" transform="translate(-132.74 -48.5)" fill="#eb001b"/><path d="M615.26,197.6a148.95,148.95,0,0,1-241,117.21,149.43,149.43,0,0,0,0-234.42,148.95,148.95,0,0,1,241,117.21Z" transform="translate(-132.74 -48.5)" fill="#f79e1b"/></svg>';

        let discoversingle = '<svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="780px" height="501px" viewBox="0 0 780 501"><path fill="#F47216" d="M409.412,197.758c30.938,0,56.02,23.58,56.02,52.709v0.033c0,29.129-25.082,52.742-56.02,52.742c-30.941,0-56.022-23.613-56.022-52.742v-0.033C353.39,221.338,378.471,197.758,409.412,197.758z"/></svg>';

        const swapColor = function (basecolor) {
            document.querySelectorAll('.lightcolor').forEach(function (el) {
                el.setAttribute('class', 'lightcolor ' + basecolor);
            });
            document.querySelectorAll('.darkcolor').forEach(function (el) {
                el.setAttribute('class', 'darkcolor ' + basecolor + 'dark');
            });
        };

        const cardnumbermask = new IMask(cardnumber, {
            mask: [
                { mask: '0000 000000 00000', regex: /^3[47]\d{0,13}/, cardtype: 'american express' },
                { mask: '0000 0000 0000 0000', regex: /^(?:6011|65\d{0,2}|64[4-9]\d?)\d{0,12}/, cardtype: 'discover' },
                { mask: '0000 000000 0000', regex: /^3(?:0([0-5]|9)|[689]\d?)\d{0,11}/, cardtype: 'diners' },
                { mask: '0000 0000 0000 0000', regex: /^(5[1-5]\d{0,2}|22[2-9]\d?|2[3-7]\d{0,2})\d{0,12}/, cardtype: 'mastercard' },
                { mask: '0000 0000 0000 0000', regex: /^4\d{0,15}/, cardtype: 'visa' },
                { mask: '0000 0000 0000 0000', regex: /^62\d{0,14}/, cardtype: 'unionpay' },
                { mask: '0000 0000 0000 0000', cardtype: 'Unknown' }
            ],
            dispatch: function (appended, dynamicMasked) {
                const number = (dynamicMasked.value + appended).replace(/\D/g, '');
                for (let i = 0; i < dynamicMasked.compiledMasks.length; i++) {
                    const re = new RegExp(dynamicMasked.compiledMasks[i].regex);
                    if (number.match(re) !== null) return dynamicMasked.compiledMasks[i];
                }
            }
        });

        const expirationdatemask = new IMask(expirationdate, {
            mask: 'MM/YY',
            blocks: {
                YY: new IMask.MaskedRange({ from: 0, to: 99 }),
                MM: new IMask.MaskedRange({ from: 1, to: 12 })
            }
        });

        const securitycodemask = new IMask(securitycode, { mask: '0000' });

        cardnumbermask.on('accept', function () {
            switch (cardnumbermask.masked.currentMask.cardtype) {
                case 'american express': ccicon.innerHTML = amex; ccsingle.innerHTML = amexsingle; swapColor('green'); break;
                case 'visa':            ccicon.innerHTML = visa; ccsingle.innerHTML = visasingle; swapColor('lime'); break;
                case 'discover':        ccicon.innerHTML = discover; ccsingle.innerHTML = discoversingle; swapColor('purple'); break;
                case 'mastercard':      ccicon.innerHTML = mastercard; ccsingle.innerHTML = mastercardsingle; swapColor('lightblue'); break;
                default:                ccicon.innerHTML = ''; ccsingle.innerHTML = ''; swapColor('grey'); break;
            }
        });

        generatecard.addEventListener('click', function () {
            const testCards = ['4000056655665556','5200828282828210','371449635398431','6011000990139424'];
            cardnumbermask.unmaskedValue = testCards[Math.floor(Math.random() * testCards.length)];
        });

        document.querySelector('.preload').classList.remove('preload');

        document.querySelector('.creditcard').addEventListener('click', function () {
            this.classList.toggle('flipped');
        });

        name.addEventListener('input', function () {
            const val = this.value.length === 0 ? 'JOHN DOE' : this.value;
            document.getElementById('svgname').innerHTML = val;
            document.getElementById('svgnameback').innerHTML = val;
        });
        cardnumbermask.on('accept', function () {
            document.getElementById('svgnumber').innerHTML = cardnumbermask.value.length === 0 ? '0123 4567 8910 1112' : cardnumbermask.value;
        });
        expirationdatemask.on('accept', function () {
            document.getElementById('svgexpire').innerHTML = expirationdatemask.value.length === 0 ? '01/23' : expirationdatemask.value;
        });
        securitycodemask.on('accept', function () {
            document.getElementById('svgsecurity').innerHTML = securitycodemask.value.length === 0 ? '985' : securitycodemask.value;
        });

        name.addEventListener('focus', () => document.querySelector('.creditcard').classList.remove('flipped'));
        cardnumber.addEventListener('focus', () => document.querySelector('.creditcard').classList.remove('flipped'));
        expirationdate.addEventListener('focus', () => document.querySelector('.creditcard').classList.remove('flipped'));
        securitycode.addEventListener('focus', () => document.querySelector('.creditcard').classList.add('flipped'));
    };
    </script>
</body>
</html>
